# Render.com Deployment Configuration
# Docs: https://render.com/docs/render-yaml-reference
#
# PR-ADS-019: In-app APScheduler added (api/scheduler.py).
# Render cron jobs decommissioned — scheduling is now handled inside the web
# service process. The three former cron services (logistaas-daily-pulse,
# logistaas-weekly-report, logistaas-monthly-strategy) must NOT be re-enabled
# while the in-app scheduler is active — duplicate runs will generate
# duplicate reports and emails.
#
# Single-service architecture (Phase 1):
#   One Render Web Service handles: UI, API, manual run endpoints,
#   and all three scheduled Phase 1 jobs (daily / weekly / monthly).
#
# All secrets are marked sync: false — set them in the Render dashboard under
# the web service's "Environment" tab. Never commit real values here.

services:
  # ─────────────────────────────────────────────────────────
  # Web Service — FastAPI read-only API + in-app scheduler
  # Handles: health checks, readiness, report/run endpoints,
  #          scheduled daily/weekly/monthly Phase 1 jobs
  # Start: python -m uvicorn api.server:app --host 0.0.0.0 --port $PORT
  # Health check: /health
  # Scheduler status: /scheduler/status
  # ─────────────────────────────────────────────────────────
  - type: web
    name: logistaas-ads-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ADMIN_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: WINDSOR_API_KEY
        sync: false
      - key: WINDSOR_ACCOUNT_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: REPORT_SENDER_EMAIL
        sync: false
      - key: REPORT_RECIPIENT_EMAIL
        sync: false
